services:
  mongo:
    image: mongo:7
    container_name: chat-mvp-mongo
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: >
        mongosh --quiet --port 27017 --eval "
          try { rs.status().ok }
          catch (e) {
            rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] }).ok
          }
        "
      interval: 5s
      timeout: 30s
      retries: 30
      start_period: 5s

volumes:
  mongo_data:
